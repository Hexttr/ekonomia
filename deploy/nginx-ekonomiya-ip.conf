# Access by IP on port 80 (3010 often blocked from outside)
# sudo cp deploy/nginx-ekonomiya-ip.conf /etc/nginx/sites-available/ekonomiya-ip
# sudo ln -sf /etc/nginx/sites-available/ekonomiya-ip /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 178.170.165.78 _;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
