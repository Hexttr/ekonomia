services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ekonomiya
      MYSQL_USER: ${MYSQL_USER:-ekonomiya}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - ekonomiya_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-ekonomiya}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-ekonomiya}:${MYSQL_PASSWORD}@mysql:3306/ekonomiya
      ACCESS_PASSWORD: ${ACCESS_PASSWORD:?set ACCESS_PASSWORD}
    command: >
      sh -c "./node_modules/.bin/prisma db push && node server.js"

volumes:
  ekonomiya_mysql:
